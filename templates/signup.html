<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardAI | Create Security Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f8fafc; /* Matching Dashboard Background */
            color: #1e293b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .signup-card { 
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h2 { 
            color: #0f172a; 
            font-weight: 800; 
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* INPUT VISIBILITY FIX (Matching Login/Dashboard) */
        .form-control { 
            background: #ffffff !important;
            color: #0f172a !important; /* Text hamesha dark nazar aaye */
            border: 1px solid #cbd5e1 !important;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            transition: 0.3s ease;
            margin-bottom: 15px;
        }

        .form-control:focus { 
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        /* Autofill Visibility Fix */
        input:-webkit-autofill {
            -webkit-text-fill-color: #0f172a !important;
            -webkit-box-shadow: 0 0 0px 1000px #ffffff inset !important;
        }

        .btn-signup { 
            background: #0f172a; 
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-signup:hover { 
            background: #1e293b;
            transform: translateY(-1px);
        }

        .alert-msg { 
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #b91c1c;
            font-size: 0.85rem;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
        }

        a { 
            color: #3b82f6; 
            text-decoration: none; 
            font-size: 0.95rem;
            font-weight: 500;
        }

        a:hover { 
            text-decoration: underline;
        }

        .show-pass {
            font-size: 0.75rem;
            color: #64748b;
            display: block;
            text-align: right;
            margin-top: -10px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .footer-links {
            margin-top: 25px;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="signup-card">
        <h2>🛡️ Signup</h2>
        <p class="subtitle">Create Your Operator ID</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="alert-msg">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/signup" method="POST" id="signupForm">
            <input type="text" name="username" class="form-control" placeholder="Create Username" required autocomplete="off">
            
            <input type="password" name="password" id="passInput" class="form-control" placeholder="Create Password" required minlength="6">
            <span class="show-pass" onclick="togglePass()">Show Password</span>

            <button type="submit" class="btn btn-signup">Create Account</button>
        </form>

        <div class="footer-links">
            <p style="color: #64748b; font-size: 0.9rem;">Already Authorized? <a href="/login">Sign In</a></p>
            <p><a href="/">← Return to Dashboard</a></p>
        </div>
    </div>

    <script>
        function togglePass() {
            var x = document.getElementById("passInput");
            var s = document.querySelector(".show-pass");
            if (x.type === "password") {
                x.type = "text";
                s.innerText = "Hide Password";
            } else {
                x.type = "password";
                s.innerText = "Show Password";
            }
        }
    </script>
</body>
</html>
